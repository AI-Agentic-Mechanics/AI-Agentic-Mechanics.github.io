<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Simple AI assistant setup image</title>
  <desc id="desc">A clean promotional graphic showing a laptop with simple prompts for scheduling, follow-up, and paperwork support.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f1e8" />
      <stop offset="55%" stop-color="#e7edf4" />
      <stop offset="100%" stop-color="#d9e5dc" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183153" />
      <stop offset="100%" stop-color="#284f6d" />
    </linearGradient>
    <linearGradient id="keyboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7dde4" />
      <stop offset="100%" stop-color="#bcc6d1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#7f8b95" flood-opacity="0.18" />
    </filter>
    <style>
      .serif { font-family: "Georgia", "Times New Roman", serif; }
      .sans { font-family: "Helvetica Neue", "Arial", sans-serif; }
      .heading { fill: #142235; font-size: 58px; font-weight: 700; letter-spacing: -1px; }
      .sub { fill: #39546c; font-size: 29px; font-weight: 500; }
      .chip { fill: rgba(255,255,255,0.92); stroke: rgba(20,34,53,0.08); stroke-width: 1.5; }
      .chipText { fill: #183153; font-size: 25px; font-weight: 700; letter-spacing: 0.4px; }
      .uiText { fill: #eef4fb; font-size: 22px; font-weight: 500; }
      .prompt { fill: #17314a; font-size: 20px; font-weight: 600; }
      .meta { fill: #47627a; font-size: 18px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)" />
  <circle cx="1040" cy="200" r="130" fill="#fff8ef" opacity="0.75" />
  <circle cx="160" cy="985" r="170" fill="#dce9df" opacity="0.85" />
  <path d="M0 930 C210 860 410 1015 640 940 C860 870 1010 930 1200 870 L1200 1200 L0 1200 Z" fill="#edf2f6" opacity="0.95" />

  <g transform="translate(102 110)">
    <rect x="0" y="0" rx="22" ry="22" width="515" height="190" fill="rgba(255,255,255,0.82)" />
    <text x="36" y="68" class="serif heading">Simple AI Assistants</text>
    <text x="36" y="118" class="sans sub">Practical help for small business tasks</text>
    <g transform="translate(36 145)">
      <rect x="0" y="0" rx="18" ry="18" width="322" height="42" class="chip" />
      <text x="24" y="28" class="sans chipText">Done-for-you setup + support</text>
    </g>
  </g>

  <g transform="translate(182 330)" filter="url(#shadow)">
    <rect x="0" y="0" width="836" height="525" rx="28" ry="28" fill="#0f2031" />
    <rect x="24" y="24" width="788" height="477" rx="20" ry="20" fill="url(#screen)" />

    <g transform="translate(66 74)">
      <rect x="0" y="0" width="682" height="70" rx="18" ry="18" fill="rgba(255,255,255,0.1)" />
      <circle cx="30" cy="35" r="7" fill="#ffd168" />
      <circle cx="56" cy="35" r="7" fill="#ff8c73" />
      <circle cx="82" cy="35" r="7" fill="#86d78f" />
      <text x="122" y="43" class="sans uiText">Daily business help</text>
    </g>

    <g transform="translate(66 172)">
      <rect x="0" y="0" width="540" height="74" rx="22" ry="22" fill="#f7fbff" />
      <text x="28" y="46" class="sans prompt">Help me organize my weekly schedule and reminders</text>
      <text x="0" y="102" class="sans meta">Scheduling help</text>
    </g>

    <g transform="translate(150 300)">
      <rect x="0" y="0" width="530" height="74" rx="22" ry="22" fill="#d8f0e0" />
      <text x="28" y="46" class="sans prompt">Draft polite client emails and follow-up messages</text>
      <text x="0" y="102" class="sans meta">Follow-up help</text>
    </g>

    <g transform="translate(66 398)">
      <rect x="0" y="0" width="602" height="74" rx="22" ry="22" fill="#f7fbff" />
      <text x="28" y="46" class="sans prompt">Create a simple checklist for invoices and paperwork</text>
    </g>
  </g>

  <g transform="translate(150 830)" filter="url(#shadow)">
    <path d="M65 0 H835 C870 0 892 13 904 42 L942 134 H0 L38 42 C50 13 72 0 107 0 Z" fill="url(#keyboard)" />
    <rect x="420" y="66" width="102" height="18" rx="9" ry="9" fill="#9ca8b4" opacity="0.75" />
  </g>

  <g transform="translate(820 930)">
    <rect x="0" y="0" width="254" height="118" rx="24" ry="24" fill="rgba(255,255,255,0.88)" />
    <text x="28" y="44" class="sans prompt" style="font-size:24px;">Beginner-friendly</text>
    <text x="28" y="76" class="sans meta" style="font-size:21px;">Setup, tailoring, and</text>
    <text x="28" y="103" class="sans meta" style="font-size:21px;">one-on-one walkthrough</text>
  </g>
</svg>
